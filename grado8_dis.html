async function loadAllImages(){
  // Collect all elements with data-id set
  const allBoxes = document.querySelectorAll("[data-id]:not([data-img-loaded])");
  for(const el of allBoxes){
    const id = el.dataset.id;
    if(!id) continue;
    el.dataset.imgLoaded = "1";
    const skel = el.querySelector(".caa-skel");
    const img = document.createElement("img");
    img.alt = el.dataset.kw || "";
    img.onerror = ()=>{
      if(skel) skel.remove();
      const kw = el.dataset.kw || "";
      const em = EMOJI_FB[kw];
      if(em){
        const espan = document.createElement("span");
        espan.textContent = em;
        espan.style.cssText = "font-size:2rem;line-height:1;display:block;text-align:center";
        if(skel) el.insertBefore(espan, skel);
        else el.insertBefore(espan, el.firstChild);
      } else if(skel){
        skel.remove();
      }
    };
    img.onload = ()=>{ if(skel) skel.remove(); };
    img.src = arasaacUrl(id);
    if(skel) el.insertBefore(img, skel);
    else el.prepend(img);
  }

  // Elements with no static ID: try API
  const noIdBoxes = document.querySelectorAll(".caa-wbox:not([data-id]):not([data-api-tried]),.caa-opt:not([data-id]):not([data-api-tried])");
  for(const el of noIdBoxes){
    el.dataset.apiTried = "1";
    const kw = el.dataset.kw;
    if(!kw || el.classList.contains("no-img")) continue;
    const id = await cercaIdAsync(kw);
    if(id){
      el.dataset.id = id;
      const skel = el.querySelector(".caa-skel");
      const img = document.createElement("img");
      img.alt = kw;
      img.onerror = ()=>{ if(skel) skel.remove(); };
      img.onload = ()=>{ if(skel) skel.remove(); };
      img.src = arasaacUrl(id);
      if(skel) el.insertBefore(img, skel);
      else el.prepend(img);
    } else {
      el.classList.add("no-img");
      const skel = el.querySelector(".caa-skel");
      if(skel) skel.remove();
      const em = EMOJI_FB[kw];
      if(em){
        const espan = document.createElement("span");
        espan.textContent = em;
        espan.style.cssText = "font-size:1.8rem;line-height:1;display:block;text-align:center";
        el.prepend(espan);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  INTERAZIONI
// ═══════════════════════════════════════════════════════════════
const _answers = {}; // domN -> {sel, ok}
const _vfAnswers = {}; // "domN_ri" -> {val, ok}
let _completedCount = 0;

function caaSelOpt(btn, domN, idx, ok){
  const dom = document.getElementById("caa-dom-"+domN);
  dom.querySelectorAll(".caa-opt").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  const wasAnswered = _answers[domN] !== undefined;
  _answers[domN] = {sel:idx, ok};
  if(!wasAnswered){ _completedCount++; aggiornaPB(); }
  dom.classList.add("att");
  setTimeout(()=>dom.classList.remove("att"),600);
}

function caaSelVF(btn, domN, ri, val, ok){
  const row = btn.closest(".caa-vf-row");
  row.querySelectorAll(".caa-vf-btn").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  const key = domN+"_"+ri;
  const wasAnswered = _vfAnswers[key] !== undefined;
  _vfAnswers[key] = {val, ok};
  if(!wasAnswered){ _completedCount++; aggiornaPB(); }
}

function aggiornaPB(){
  const pct = TOT_DOM > 0 ? (_completedCount/TOT_DOM)*100 : 0;
  document.getElementById("pbfill").style.width = pct+"%";
  document.getElementById("pbinfo-l").textContent = `Completate: ${_completedCount} / ${TOT_DOM} risposte`;
}

function caaControlla(){
  let correct = 0;
  // SM
  Object.entries(_answers).forEach(([domN, ans]) => {
    const dom = document.getElementById("caa-dom-"+domN);
    if(!dom) return;
    dom.querySelectorAll(".caa-opt").forEach((opt, i) => {
      opt.classList.remove("corr","err");
      if(i === ans.ok) opt.classList.add("corr");
      else if(i === ans.sel && ans.sel !== ans.ok) opt.classList.add("err");
    });
    if(ans.sel === ans.ok) correct++;
  });
  // VF
  Object.entries(_vfAnswers).forEach(([key, ans]) => {
    const [domN, ri] = key.split("_");
    const dom = document.getElementById("caa-dom-"+domN);
    if(!dom) return;
    const rows = dom.querySelectorAll(".caa-vf-row");
    const row = rows[parseInt(ri)];
    if(!row) return;
    row.querySelectorAll(".caa-vf-btn").forEach(b=>{
      b.classList.remove("corr","err");
      const btnVal = b.textContent === "V";
      if(btnVal === ans.ok) b.classList.add("corr");
      else if(btnVal === ans.val && ans.val !== ans.ok) b.classList.add("err");
    });
    if(ans.val === ans.ok) correct++;
  });

  const result = document.getElementById("caa-result");
  document.getElementById("caa-pts").textContent = `${correct} / ${TOT_DOM}`;
  document.getElementById("caa-sub").textContent = "risposte corrette";
  const pct = TOT_DOM > 0 ? Math.round(correct/TOT_DOM*100) : 0;
  const msgs = [
    [90, "🌟 Eccellente! Hai capito tutto il racconto!"],
    [70, "✅ Bravo! Hai risposto bene a molte domande."],
    [50, "👍 Abbastanza bene! Puoi rileggere il testo per migliorare."],
    [0, "📖 Rileggi il racconto. Puoi farcela!"],
  ];
  const msg = msgs.find(([t]) => pct >= t);
  document.getElementById("caa-msg").textContent = msg ? msg[1] : "";
  result.classList.add("show");
  result.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function caaReset(){
  Object.keys(_answers).forEach(k=>delete _answers[k]);
  Object.keys(_vfAnswers).forEach(k=>delete _vfAnswers[k]);
  _completedCount = 0;
  aggiornaPB();
  document.querySelectorAll(".caa-opt").forEach(o=>o.classList.remove("sel","corr","err"));
  document.querySelectorAll(".caa-vf-btn").forEach(b=>b.classList.remove("sel","corr","err"));
  document.getElementById("caa-result").classList.remove("show");
}

// ═══════════════════════════════════════════════════════════════
//  TIC (accessibilità)
// ═══════════════════════════════════════════════════════════════
function togTic(nome, btnId){
  document.body.classList.toggle("tic-"+nome);
  const btn = document.getElementById(btnId);
  if(btn) btn.classList.toggle("on", document.body.classList.contains("tic-"+nome));
}
function toggleTicPanel(){
  ticPanelOpen = !ticPanelOpen;
  document.getElementById("tic-panel").style.display = ticPanelOpen ? "flex" : "none";
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener("load", () => {
  const p = new URLSearchParams(window.location.search);

  // Prova custom
  if(p.get("prova") === "custom"){
    const raw = p.get("data");
    if(raw){
      try{
        const json = decodeURIComponent(escape(atob(raw)));
        const provaCustom = JSON.parse(json);
        provaCustom.id = "custom";
        PROVE_DIS.push(provaCustom);
      }catch(e){ console.warn("Prova custom non valida:", e); }
    }
  }

  const provaRaw = p.get("prova") || "1";
  const provaId = provaRaw === "custom" ? "custom" : parseInt(provaRaw);
  NOME_STUD = p.get("nome") || "";
  CLASSE_STUD = p.get("classe") || "";

  // TIC da URL (grande, contrasto)
  const ticList = (p.get("tic") || "").split(",").filter(t=>t.trim());
  ticList.forEach(t => {
    document.body.classList.add("tic-"+t.trim());
    const btn = document.getElementById("ticb-"+t.trim());
    if(btn) btn.classList.add("on");
  });

  PROVA_ATTUALE = PROVE_DIS.find(pr=>pr.id===provaId) || PROVE_DIS[0];
  const prova = PROVA_ATTUALE;

  // Header
  document.getElementById("hdr-titolo").textContent = `Testo in CAA — ${prova.titolo}`;
  const sub = [prova.titolo, NOME_STUD, CLASSE_STUD ? "Classe "+CLASSE_STUD : ""].filter(Boolean).join(" | ");
  document.getElementById("hdr-sub").textContent = sub + " | A.S. 2025/2026";
  document.getElementById("pbinfo-prova").textContent = prova.titolo;
  document.title = `Grado 8 — ${prova.titolo}`;

  // Istruzioni
  document.getElementById("caa-audio-wrap").innerHTML = `
    <div style="background:#e3f2fd;border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:.78rem;line-height:1.7">
      ℹ️ <strong>Istruzioni:</strong><br>
      • Clicca su <strong>📍 Par. N</strong> per tornare al paragrafo giusto.<br>
      • Guarda le immagini e leggi le parole. Poi rispondi alle domande.
    </div>`;

  renderStoria(prova);
  renderDomande(prova);

  // Carica immagini async (prima quelle già con ID, poi via API)
  requestAnimationFrame(() => loadAllImages());
});
</script>
