<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Prova Adattata / CAA - Grado 8</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --c1: #01579b; --c2: #0277bd; --bg: #e8f4fd; --white: #ffffff; }
        body { font-family: 'Lexend', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
        
        /* Layout Split Screen */
        .container { display: flex; height: 100vh; }
        
        /* Colonna Testo */
        .text-column { 
            width: 50%; padding: 30px; overflow-y: auto; 
            background: var(--white); border-right: 2px solid #ddd;
        }
        .paragrafo { 
            padding: 15px; margin-bottom: 10px; border-radius: 8px; 
            transition: 0.3s; line-height: 1.8; font-size: 1.2rem;
        }
        .paragrafo.active { background: #fff9c4; border-left: 5px solid #f9a825; }

        /* Colonna Domande */
        .quiz-column { width: 50%; padding: 30px; overflow-y: auto; }
        .domanda-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; 
        }

        /* Stile CAA (Pittogrammi) - Attivo solo con classe .mode-caa */
        .pittogramma { display: none; width: 50px; height: 50px; margin-bottom: 5px; }
        .mode-caa .pittogramma { display: block; }
        .token { display: inline-flex; flex-direction: column; align-items: center; margin: 5px; vertical-align: top; }

        /* Audio Player Flottante */
        #audio-player { 
            position: fixed; bottom: 20px; left: 20px; 
            background: var(--c1); color: white; padding: 10px 20px; 
            border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; overflow-y: auto; }
            .text-column, .quiz-column { width: 100%; height: auto; }
        }
    </style>
</head>
<body id="main-body">

<div class="container">
    <!-- SINISTRA: TESTO -->
    <div class="text-column" id="testo-display">
        <h1 id="titolo-prova">Caricamento...</h1>
        <div id="contenuto-testo"></div>
    </div>

    <!-- DESTRA: DOMANDE -->
    <div class="quiz-column">
        <div id="contenuto-domande"></div>
        <button onclick="consegnaProva()" id="btn-fine" style="width:100%; padding:20px; background:var(--c1); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
            INVIA RISPOSTE
        </button>
    </div>
</div>

<div id="audio-player" onclick="toggleAudio()">
    <span id="audio-icon">🔊</span> <span id="audio-text">Ascolta Paragrafo</span>
</div>

<script>
    // Dati simulati (Normalmente pescati dai tuoi file .js)
    const PROVE_DATA = {
        "1": {
            titolo: "Il cane di Lorenzo",
            paragrafi: [
                { id: 1, testo: "Lorenzo ha un cane di nome Rex. Rex è molto grande e ha il pelo marrone.", parole: ["Lorenzo", "cane", "Rex", "grande", "marrone"] },
                { id: 2, testo: "Lorenzo gioca ogni giorno con la palla insieme al suo amico a quattro zampe.", parole: ["Lorenzo", "gioca", "palla", "amico"] }
            ],
            domande: [
                { q: "Come si chiama il cane?", opzioni: ["Fido", "Rex", "Lupo"], corretta: 1 }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const provaId = urlParams.get('prova') || "1";
    const isCAA = urlParams.get('tic') === 'caa';
    const currentProva = PROVE_DATA[provaId];

    // Inizializzazione
    function init() {
        if (isCAA) document.body.classList.add('mode-caa');
        document.getElementById('titolo-prova').innerText = currentProva.titolo;
        renderTesto();
        renderDomande();
    }

    function renderTesto() {
        const container = document.getElementById('contenuto-testo');
        currentProva.paragrafi.forEach(p => {
            const div = document.createElement('div');
            div.className = `paragrafo par-${p.id}`;
            div.id = `p-${p.id}`;
            
            // Logica CAA: trasforma parole in token con immagini ARASAAC
            if (isCAA) {
                let htmlTokens = "";
                const parole = p.testo.split(" ");
                parole.forEach(par => {
                    // Nota: Qui andrebbe il codice per mappare la parola all'ID immagine ARASAAC
                    htmlTokens += `
                        <div class="token">
                            <img class="pittogramma" src="https://api.arasaac.org/api/pictograms/it/search/${par.toLowerCase()}" onerror="this.style.display='none'">
                            <span>${par}</span>
                        </div>`;
                });
                div.innerHTML = htmlTokens;
            } else {
                div.innerText = p.testo;
            }
            container.appendChild(div);
        });
    }

    function renderDomande() {
        const container = document.getElementById('contenuto-domande');
        currentProva.domande.forEach((d, index) => {
            const div = document.createElement('div');
            div.className = "domanda-card";
            div.innerHTML = `<h3>${d.q}</h3>`;
            d.opzioni.forEach((opt, i) => {
                div.innerHTML += `
                    <label style="display:block; margin:10px 0; font-size:1.1rem; cursor:pointer;">
                        <input type="radio" name="q${index}" value="${i}"> ${opt}
                    </label>
                `;
            });
            container.appendChild(div);
        });
    }

    // GESTIONE AUDIO (Babaluka Predisposizione)
    let isPlaying = false;
    const synth = window.speechSynthesis;

    function toggleAudio() {
        // Se hai file MP3:
        // let audio = new Audio(`audio/prova_${provaId}.mp3`);
        // audio.play();
        
        // Altrimenti usa TTS come fallback:
        const attivo = document.querySelector('.paragrafo.active');
        const testoDaLeggere = attivo ? attivo.innerText : currentProva.paragrafi[0].testo;
        
        const utter = new SpeechSynthesisUtterance(testoDaLeggere);
        utter.lang = 'it-IT';
        utter.rate = 0.9;
        synth.speak(utter);
    }

    // Illumina paragrafo basato sullo scroll o click domande (da implementare logica osservatore)
    
    init();
</script>
</body>
</html>
