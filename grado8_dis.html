<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

<title>Prova personalizzata</title>

<style>
:root{
  --c1:#01579b;--c2:#0277bd;--cl:#e1f5fe;--cb:#81d4fa;
  --hi:#fff9c4;--ob:#f9a825;
  --bi:#fff;--tx:#1a1a1a;--gr:#f5f5f5;
  --font:'Lexend',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font);
  background:#e8f4fd;
  color:var(--tx);
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1200px;
  margin:auto;
  padding:15px;
  gap:20px;
}

.left{
  width:60%;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

.right{
  width:40%;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* PARAGRAFI */
.par{
  padding:14px;
  margin-bottom:12px;
  border-left:5px solid transparent;
  transition:.3s;
}

.par.att{
  background:var(--hi);
  border-left:5px solid var(--ob);
}

.plbl{
  font-size:12px;
  font-weight:800;
  color:var(--c2);
  margin-bottom:6px;
}

.fr{
  display:inline;
}

/* DOMANDE */
.box{
  background:#fff;
  padding:15px;
  border-radius:15px;
}

.opt{
  background:var(--gr);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  cursor:pointer;
}

.opt.correct{background:#c8e6c9}
.opt.wrong{background:#ffcdd2}

/* TIC */
#tic-box{
  display:none;
}

.tic label{
  display:block;
  margin-bottom:6px;
  cursor:pointer;
}

/* ACCESSIBILITÀ */
.acc-maiuscolo{ text-transform:uppercase }
.acc-font-dys{ font-family:'Lexend',sans-serif }
.acc-spaziatura{ line-height:2.5; letter-spacing:.08em }
.acc-contrasto{ background:#fff; color:#000 }

</style>

</head>

<body>

<div class="container">

  <!-- TESTO -->

  <div class="left" id="text"></div>

  <!-- SIDEBAR -->

  <div class="right">

```
<div class="box" id="question-box"></div>

<div class="box" id="tic-box">
  <h3>Strumenti</h3>
  <div class="tic">
    <label><input type="checkbox" data-tic="maiuscolo"> Maiuscolo</label>
    <label><input type="checkbox" data-tic="font-dys"> Font leggibile</label>
    <label><input type="checkbox" data-tic="spaziatura"> Spaziatura</label>
    <label><input type="checkbox" data-tic="contrasto"> Contrasto</label>
  </div>
</div>
```

  </div>
</div>

<script>
const p = new URLSearchParams(window.location.search);
let data = null;
let current = 0;

/* TIC ATTIVABILI SOLO SE PARAMETRO */
if(p.get('tic-editable') === '1'){
  document.getElementById('tic-box').style.display = 'block';
}

/* TOGGLE TIC */
document.addEventListener('change', e=>{
  if(e.target.dataset.tic){
    const cls = 'acc-' + e.target.dataset.tic;
    document.body.classList.toggle(cls, e.target.checked);
  }
});

/* CARICAMENTO DATI */
if(p.get('prova') === 'custom'){
  const raw = p.get('data');
  const fmt = p.get('fmt');

  let json;
  if(fmt === 'lz'){
    json = LZString.decompressFromEncodedURIComponent(raw);
  } else {
    json = decodeURIComponent(escape(atob(raw)));
  }

  data = JSON.parse(json);
  init();
}

/* INIT */
function init(){
  const textDiv = document.getElementById('text');

  data.paragrafi.forEach((p, i)=>{
    const div = document.createElement('div');
    div.className = 'par';
    div.id = 'par'+i;

    div.innerHTML = `
      <div class="plbl">PARAGRAFO ${i+1}</div>
      <div>
        ${p.testo.split('.').map(f=>`<span class="fr">${f}.</span>`).join('')}
      </div>
    `;

    textDiv.appendChild(div);
  });

  focusPar(0);
}

/* HIGHLIGHT */
function focusPar(i){
  document.querySelectorAll('.par').forEach(p=>p.classList.remove('att'));
  const el = document.getElementById('par'+i);
  el.classList.add('att');
  el.scrollIntoView({behavior:'smooth',block:'center'});

  showQ(i);
}

/* DOMANDE */
function showQ(i){
  const q = data.paragrafi[i].domanda;
  const box = document.getElementById('question-box');

  if(!q){ box.innerHTML=''; return; }

  box.innerHTML = `<h3>${q.testo}</h3>`;

  q.opzioni.forEach((o,idx)=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.textContent = o;

    div.onclick = ()=>{
      if(idx === q.corretta){
        div.classList.add('correct');
      } else {
        div.classList.add('wrong');
      }
    };

    box.appendChild(div);
  });
}
</script>

</body>
</html>
