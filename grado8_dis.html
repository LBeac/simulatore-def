<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
<title id="page-title">Grado 8 — Prova CAA</title>
<style>
/* ══ BASE ═══════════════════════════════════════════════════════ */
:root{
  --c1:#01579b;--c2:#0277bd;--cl:#e1f5fe;--cb:#81d4fa;
  --gok:#e8f5e9;--gbord:#2e7d32;--rc:#fdecea;--err:#c62828;
  --bi:#fff;--tx:#1a1a1a;--gr:#f0f4f8;--ob:#f9a825;
  --font:'Lexend',Verdana,sans-serif;
  --box-border:#b0c4de;--box-bg:#fff;--box-hover:#e3f2fd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#e8f4fd;color:var(--tx);font-size:15px;min-height:100vh}
.hidden{display:none!important}

/* ══ HEADER ══════════════════════════════════════════════════ */
.hdr{background:var(--c1);color:#fff;padding:12px 20px;
  border-bottom:4px solid var(--cb);position:sticky;top:0;z-index:900;
  box-shadow:0 3px 10px rgba(0,0,0,.3)}
.hdr h1{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.hdr p{font-size:.75rem;opacity:.8;margin-top:2px}

/* ══ PROGRESS BAR ═════════════════════════════════════════════ */
.pbwrap{background:#dde4ed;height:6px}
.pbfill{height:6px;background:var(--c2);transition:width .3s;width:0%}
.pbinfo{display:flex;justify-content:space-between;padding:5px 20px;
  font-size:.72rem;color:#555;background:#fff;border-bottom:1px solid #dde4ed}

/* ══ CAA PAGE LAYOUT ══════════════════════════════════════════ */
.caa-page{max-width:860px;margin:0 auto;padding:20px 16px 60px}

/* ── SEZIONE STORIA ─────────────────────────────────────────── */
.caa-storia-wrap{background:#fff;border-radius:14px;padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:28px}
.caa-sezione-titolo{font-size:.78rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.08em;color:var(--c2);margin-bottom:14px;
  display:flex;align-items:center;gap:7px}
.caa-sezione-titolo::after{content:'';flex:1;height:2px;background:var(--cl)}

/* Paragrafo */
.caa-par{margin-bottom:22px}
.caa-par-num{display:inline-flex;align-items:center;gap:5px;
  background:var(--c2);color:#fff;padding:3px 10px;border-radius:12px;
  font-size:.68rem;font-weight:800;margin-bottom:10px}

/* Flusso di parole */
.caa-words{display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px 4px;
  line-height:1}

/* Box parola chiave */
.caa-wbox{display:inline-flex;flex-direction:column;align-items:center;
  gap:4px;padding:5px 6px;border:2px solid var(--box-border);
  border-radius:9px;background:var(--box-bg);cursor:default;
  transition:background .15s;min-width:60px;max-width:90px}
.caa-wbox img{width:72px;height:72px;object-fit:contain;display:block;
  border-radius:5px}
.caa-wbox .caa-wlbl{font-size:.55rem;font-weight:800;text-transform:uppercase;
  text-align:center;color:var(--c1);word-break:break-word;line-height:1.15;
  max-width:80px}
/* Skeleton loading */
.caa-wbox .caa-skel{width:72px;height:72px;border-radius:5px;
  background:linear-gradient(90deg,#e3f2fd 25%,#bbdefb 50%,#e3f2fd 75%);
  background-size:200% 100%;animation:sk 1.2s infinite}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
/* Parole funzione */
.caa-fn{font-size:.85rem;color:#555;align-self:flex-end;
  padding-bottom:6px;font-weight:600}
/* Punteggiatura */
.caa-punct{font-size:1rem;color:#333;align-self:flex-end;padding-bottom:4px;font-weight:700}
/* Parola senza immagine — solo box testo */
.caa-wbox.no-img img{display:none}
.caa-wbox.no-img .caa-skel{display:none}
.caa-wbox.no-img{min-height:30px;justify-content:center;background:var(--gr);
  border-style:dashed}

/* ── SEZIONE DOMANDE ────────────────────────────────────────── */
.caa-domande-wrap{background:#fff;border-radius:14px;padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,.08)}

/* Singola domanda */
.caa-dom{border:2px solid #dde4ed;border-radius:12px;padding:16px;
  margin-bottom:20px;transition:border-color .2s}
.caa-dom.att{border-color:var(--cb);background:var(--cl)}
.caa-dom-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.caa-dom-num{background:var(--c2);color:#fff;border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;flex-shrink:0}
.caa-dom-par{font-size:.68rem;background:#e8f4fd;color:var(--c1);
  padding:2px 8px;border-radius:8px;font-weight:700}
.caa-dom-par-ref{font-size:.68rem;color:#777}

/* Testo domanda in CAA */
.caa-dom-testo{margin-bottom:14px}
.caa-dom-testo .caa-words{gap:5px 3px}
.caa-dom-testo .caa-wbox{min-width:52px;max-width:78px}
.caa-dom-testo .caa-wbox img{width:58px;height:58px}
.caa-dom-testo .caa-wbox .caa-skel{width:58px;height:58px}
.caa-dom-testo .caa-wbox .caa-wlbl{font-size:.5rem;max-width:66px}

/* Opzioni 2×2 */
.caa-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.caa-opt{display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 8px;border:2.5px solid var(--box-border);border-radius:11px;
  background:var(--box-bg);cursor:pointer;transition:all .15s;text-align:center}
.caa-opt:hover{border-color:var(--c2);background:var(--cl)}
.caa-opt.sel{border-color:var(--c2);background:#e3f2fd;border-width:3px}
.caa-opt.corr{border-color:var(--gbord)!important;background:var(--gok)!important}
.caa-opt.err{border-color:var(--err)!important;background:var(--rc)!important}
.caa-opt img{width:80px;height:80px;object-fit:contain;border-radius:7px}
.caa-opt .caa-skel{width:80px;height:80px;border-radius:7px;
  background:linear-gradient(90deg,#e3f2fd 25%,#bbdefb 50%,#e3f2fd 75%);
  background-size:200% 100%;animation:sk 1.2s infinite}
.caa-opt .caa-opt-lbl{font-size:.72rem;font-weight:800;color:var(--tx);
  line-height:1.3;text-align:center}
.caa-opt .caa-opt-letter{font-size:.68rem;font-weight:800;color:var(--c1);
  background:var(--cl);padding:1px 6px;border-radius:5px}
.caa-opt.no-img img,.caa-opt.no-img .caa-skel{display:none}

/* VF domande */
.caa-vf{display:flex;flex-direction:column;gap:8px}
.caa-vf-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border:2px solid #dde4ed;border-radius:9px;background:#f9fafb}
.caa-vf-testo{flex:1;font-size:.8rem;font-weight:600;line-height:1.4}
.caa-vf-btns{display:flex;gap:6px}
.caa-vf-btn{padding:5px 14px;border:2px solid #bbb;border-radius:7px;
  font-weight:800;font-size:.8rem;cursor:pointer;font-family:var(--font);
  background:#fff;transition:all .15s}
.caa-vf-btn:hover{border-color:var(--c2);background:var(--cl)}
.caa-vf-btn.sel{border-color:var(--c2);background:var(--c2);color:#fff}
.caa-vf-btn.corr{border-color:var(--gbord)!important;background:var(--gok)!important;color:#1b5e20!important}
.caa-vf-btn.err{border-color:var(--err)!important;background:var(--rc)!important;color:var(--err)!important}

/* ── RISULTATI ─────────────────────────────────────────────── */
.caa-result{display:none;margin-top:20px;background:var(--c1);color:#fff;
  border-radius:14px;padding:24px;text-align:center}
.caa-result.show{display:block}
.caa-result h2{font-size:1.3rem;margin-bottom:8px}
.caa-result .pts{font-size:3rem;font-weight:800}
.caa-result .sub{font-size:.9rem;opacity:.8;margin-top:4px}
.caa-result-msg{margin-top:12px;font-size:.85rem;background:rgba(255,255,255,.12);
  border-radius:8px;padding:10px 14px}

/* ── AZIONI ────────────────────────────────────────────────── */
.caa-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.caa-btn{padding:12px 20px;border:none;border-radius:10px;font-size:.9rem;
  font-weight:800;cursor:pointer;font-family:var(--font);transition:all .15s}
.caa-btn-check{background:var(--gbord);color:#fff}
.caa-btn-reset{background:#e0e0e0;color:#333}
.caa-btn:hover{opacity:.88;transform:translateY(-1px)}

/* ── SEZIONE GRAMMATICA ─────────────────────────────────────── */
.caa-sez-hdr{padding:8px 14px;border-radius:8px;font-size:.78rem;
  font-weight:800;color:#fff;margin-bottom:12px;margin-top:4px}
.sez0-hdr{background:#0277bd}
.sez1-hdr{background:#00695c}
.sez2-hdr{background:#6a1b9a}
.caa-hint{background:#fff8e1;border-left:4px solid var(--ob);padding:8px 12px;
  border-radius:0 8px 8px 0;font-size:.76rem;margin-bottom:12px;line-height:1.6}

/* ── TIC PANEL ──────────────────────────────────────────────── */
#tic-toggle{position:fixed;bottom:18px;right:12px;z-index:990;width:44px;height:44px;
  border-radius:50%;border:3px solid #fff;background:var(--ob);color:#5a3a00;
  cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,.4);font-family:var(--font)}
#tic-panel{position:fixed;bottom:68px;right:12px;z-index:990;display:none;
  flex-direction:column;gap:6px}
.tic-btn{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;
  border:2px solid #aaa;background:#fff;cursor:pointer;font-size:.8rem;
  font-weight:700;font-family:var(--font);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tic-btn.on{border-color:var(--c2);background:var(--cl)}

/* Modalità alto contrasto */
body.tic-contrasto{background:#111!important}
body.tic-contrasto .caa-storia-wrap,body.tic-contrasto .caa-domande-wrap{background:#000!important}
body.tic-contrasto .caa-wbox{background:#111!important;border-color:#555!important}
body.tic-contrasto .caa-wbox .caa-wlbl{color:#7ec8e3!important}
body.tic-contrasto .caa-fn{color:#aaa!important}
body.tic-contrasto .caa-opt{background:#111!important;border-color:#555!important}

/* Modalità testo grande */
body.tic-grande .caa-wbox img{width:90px!important;height:90px!important}
body.tic-grande .caa-wbox .caa-skel{width:90px!important;height:90px!important}
body.tic-grande .caa-wbox .caa-wlbl{font-size:.65rem!important}
body.tic-grande .caa-opt img{width:100px!important;height:100px!important}
body.tic-grande .caa-opt .caa-skel{width:100px!important;height:100px!important}

/* Glossario */
.caa-gloss{background:#fff8e1;border-radius:10px;padding:12px 16px;margin-top:16px;
  border-left:4px solid var(--ob)}
.caa-gloss-titolo{font-size:.72rem;font-weight:800;color:#7a5000;margin-bottom:8px;text-transform:uppercase}
.caa-gloss-item{font-size:.74rem;margin-bottom:5px;line-height:1.5;
  display:flex;gap:6px}
.caa-gloss-key{font-weight:800;color:var(--c1);min-width:110px;flex-shrink:0}

/* Audio button */
.caa-audio-btn{display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border:2px solid var(--cb);border-radius:8px;
  background:var(--cl);color:var(--c1);cursor:pointer;font-family:var(--font);
  font-size:.78rem;font-weight:700;margin-bottom:14px}

@media(max-width:600px){
  .caa-opts{grid-template-columns:1fr 1fr}
  .caa-opt img,.caa-opt .caa-skel{width:60px!important;height:60px!important}
  .caa-wbox img,.caa-wbox .caa-skel{width:60px!important;height:60px!important}
  .caa-wbox{min-width:52px;max-width:76px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<div class="hdr">
  <h1>📖 <span id="hdr-titolo">Testo in CAA</span></h1>
  <p id="hdr-sub">A.S. 2025/2026</p>
</div>
<div class="pbwrap"><div class="pbfill" id="pbfill"></div></div>
<div class="pbinfo">
  <span id="pbinfo-l">Completate: 0 / — risposte</span>
  <span id="pbinfo-r">📍 <span id="pbinfo-prova">—</span></span>
</div>

<!-- ═══ MAIN CAA PAGE ═════════════════════════════════════════ -->
<div class="caa-page" id="caa-page">
  <!-- STORIA -->
  <div class="caa-storia-wrap">
    <div class="caa-sezione-titolo">📖 Leggi la storia</div>
    <div id="caa-audio-wrap"></div>
    <div id="caa-storia-content"><!-- rendered by JS --></div>
    <div id="caa-gloss-panel" class="hidden"></div>
  </div>

  <!-- DOMANDE -->
  <div class="caa-domande-wrap">
    <div class="caa-sezione-titolo">❓ Rispondi alle domande</div>
    <div id="caa-domande-content"><!-- rendered by JS --></div>
    <div class="caa-btns">
      <button class="caa-btn caa-btn-check" onclick="caaControlla()">✅ Controlla le risposte</button>
      <button class="caa-btn caa-btn-reset" onclick="caaReset()">🔄 Ricomincia</button>
    </div>
    <div class="caa-result" id="caa-result">
      <h2>🎓 Risultato della prova</h2>
      <div class="pts" id="caa-pts">—</div>
      <div class="sub" id="caa-sub">risposte corrette</div>
      <div class="caa-result-msg" id="caa-msg"></div>
    </div>
  </div>
</div>

<!-- ═══ TIC PANEL ════════════════════════════════════════════ -->
<button id="tic-toggle" title="Opzioni" onclick="toggleTicPanel()">⚙️</button>
<div id="tic-panel">
  <div class="tic-btn" id="ticb-grande" onclick="togTic('grande','ticb-grande')">🔍 Testo grande</div>
  <div class="tic-btn" id="ticb-contrasto" onclick="togTic('contrasto','ticb-contrasto')">🌗 Alto contrasto</div>
</div>

<script>
let PROVA_ATTUALE = null;
let NOME_STUD = '';
let CLASSE_STUD = '';
let TOT_DOM = 0;
let AUDIO_EL = null;
let ticPanelOpen = false;

// ═══════════════════════════════════════════════════════════════
//  DATI PROVE
// ═══════════════════════════════════════════════════════════════
const PROVE_DIS = [

// ══ PROVA 1 ═══════════════════════════════════════════════
{id:1, titolo:"Il cane di Lorenzo", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Lorenzo ha undici anni e vive in un piccolo paese vicino al fiume. Il suo cane si chiama <span class="glw" title="Rex: nome proprio di un cane labrador">Rex</span> ed è un <span class="glw" title="labrador: razza di cane di taglia media, dal pelo corto e morbido">labrador</span> color miele. Rex dorme ai piedi del letto di Lorenzo ogni notte e lo aspetta sempre davanti alla porta quando lui torna da scuola.`},
  {n:2, testo:`Un mattino d'autunno, Lorenzo aprì il cancello del giardino per prendere il giornale. In quel momento Rex scappò via di corsa, infilando il muso sotto la <span class="glw" title="recinzione: barriera che delimita uno spazio, come una rete o una staccionata">recinzione</span> rotta. Lorenzo lo chiamò ad alta voce, ma il cane non si voltò. Il cuore di Lorenzo si riempì di paura.`},
  {n:3, testo:`Lorenzo girò tutto il paese cercando Rex. Guardò dietro le case, nei <span class="glw" title="vicoli: strade strette tipiche dei vecchi centri abitati">vicoli</span>, nel parco. Chiamò il nome del cane fino a perdere la voce. Nessuno sembrava averlo visto.`},
  {n:4, testo:`Dopo un'ora, la signora Betti, la vicina di casa, uscì sul balcone e disse: «Ho sentito un cane abbaiare vicino alla <span class="glw" title="rimessa: locale coperto dove si tengono attrezzi e veicoli">rimessa</span> del trattore!» Lorenzo corse subito in quella direzione.`},
  {n:5, testo:`Vicino alla rimessa c'era un <span class="glw" title="fossato: buca lunga e stretta nel terreno, spesso piena di erba">fossato</span> pieno di erba alta. Là dentro Lorenzo vide due occhi gialli brillare. Era Rex, intrappolato tra due rami caduti. Il cane <span class="glw" title="guaiva: emetteva un suono lamentoso, tipico dei cani spaventati">guaiva</span> piano, ma stava bene.`},
  {n:6, testo:`Lorenzo liberò Rex con delicatezza e lo abbracciò forte. Quella sera, prima di dormire, il ragazzo riparò la recinzione con il papà. Rex si addormentò ai suoi piedi, come sempre, tranquillo e felice.`},
],
glossario:[
  {k:"Labrador", v:"Razza di cane di taglia media, dal pelo corto e morbido, solitamente color miele o nero."},
  {k:"Recinzione", v:"Barriera che delimita uno spazio, come una rete, una staccionata o un muro."},
  {k:"Vicoli", v:"Strade strette tipiche dei vecchi centri abitati."},
  {k:"Rimessa", v:"Locale coperto dove si tengono attrezzi, macchine o veicoli agricoli."},
  {k:"Fossato", v:"Buca lunga e stretta scavata nel terreno, spesso piena di erba o acqua."},
  {k:"Guaiva", v:"Emetteva un suono lamentoso, tipico dei cani quando hanno paura o dolore."},
],
domande:[
  {n:1,par:1,tipo:"sm",sez:0,testo:"Chi è il protagonista di questo racconto?",opts:["Rex, il cane","La signora Betti","Lorenzo, un ragazzo di undici anni","Il papà di Lorenzo"],ok:2},
  {n:2,par:1,tipo:"sm",sez:0,testo:"Come si chiama il cane di Lorenzo?",opts:["Fido","Rex","Lupo","Pallino"],ok:1},
  {n:3,par:2,tipo:"sm",sez:0,testo:"Come fece Rex a scappare dal giardino?",opts:["Saltò oltre il cancello","Passò sotto la recinzione rotta","Aprì il cancello da solo","Scappò mentre Lorenzo aveva la porta aperta"],ok:1},
  {n:4,par:4,tipo:"sm",sez:0,testo:"Chi aiutò Lorenzo a capire dove poteva essere Rex?",opts:["La signora Betti, la vicina di casa","Il papà di Lorenzo","Un ragazzo per strada","Un vigile del fuoco"],ok:0},
  {n:5,par:5,tipo:"sm",sez:0,testo:"Dove si trovava Rex quando Lorenzo lo trovò?",opts:["Dietro la porta della rimessa","Sotto un albero vicino al fiume","In un fossato tra due rami caduti","Nel parco del paese"],ok:2},
  {n:6,par:0,tipo:"vf",sez:0,testo:"Segna V se l'affermazione è vera, F se è falsa.",
    righeVF:[{t:"Lorenzo aprì il cancello per portare Rex a passeggio.",ok:false},{t:"Lorenzo cercò Rex anche nel parco del paese.",ok:true},{t:"Rex era ferito gravemente quando Lorenzo lo trovò.",ok:false}]},
  {n:7,par:6,tipo:"sm",sez:0,testo:"Cosa fece Lorenzo quella sera insieme al papà?",opts:["Portò Rex dal veterinario","Riparò la recinzione del giardino","Scrisse una lettera alla signora Betti","Comprò un nuovo cancello"],ok:1},
  {n:8,par:0,tipo:"sm",sez:0,testo:"Di cosa parla questo racconto?",opts:["Una gita in campagna","Un cane che attacca una vicina","Un ragazzo che cerca il suo cane e lo trova","Un ragazzo che compra un cane al mercato"],ok:2},
  {n:9,par:2,tipo:"sm",sez:1,testo:'Nel testo si legge: «il muso sotto la recinzione rotta». Cosa significa la parola "recinzione"?',opts:["Un tipo di cibo per cani","Una barriera che delimita uno spazio","Un fossato pieno d'acqua","Una strada di campagna"],ok:1},
  {n:10,par:5,tipo:"sm",sez:1,testo:'Nel testo Rex era "intrappolato". Qual è il contrario di "intrappolato"?',opts:["Stanco","Libero","Silenzioso","Nascosto"],ok:1},
  {n:11,par:0,tipo:"vf",sez:0,testo:"Segna V se l'affermazione è vera, F se è falsa.",
    righeVF:[{t:"Rex è un labrador color miele.",ok:true},{t:"Lorenzo trovò Rex vicino alla rimessa del trattore.",ok:true},{t:"Il racconto finisce con Rex ancora scomparso.",ok:false}]},
  {n:12,par:2,tipo:"sm",sez:1,testo:'Nella frase «Il cuore di Lorenzo si riempì di paura» quale parola indica un\'emozione?',opts:["Paura","Cuore","Lorenzo","Riempì"],ok:0},
  {n:13,par:6,tipo:"sm",sez:2,tip:"Il soggetto è chi compie l'azione. Chiedi: chi liberò Rex?",testo:'Leggi: «Lorenzo liberò Rex con delicatezza.» Qual è il soggetto?',opts:["Lorenzo","Rex","Con delicatezza","Liberò"],ok:0},
  {n:14,par:1,tipo:"sm",sez:2,tip:"Il soggetto è chi compie l'azione. Chiedi: chi dorme?",testo:'Leggi: «Rex dorme ai piedi del letto.» Qual è il soggetto?',opts:["Il letto","Rex","Lorenzo","Ai piedi"],ok:1},
  {n:15,par:2,tipo:"sm",sez:2,tip:"Il predicato verbale è il verbo. Chiedi: cosa fece Lorenzo?",testo:'Leggi: «Lorenzo chiamò il cane ad alta voce.» Qual è il predicato verbale?',opts:["Lorenzo","Chiamò","Il cane","Ad alta voce"],ok:1},
]},

// ══ PROVA 2 ═══════════════════════════════════════════════
{id:2, titolo:"La torta di Giulia", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Giulia ha dodici anni e vive con i suoi genitori e il nonno Luigi. Il nonno è il suo migliore amico. Ogni domenica mattina siedono insieme in cucina e Giulia gli racconta della scuola, dei suoi amici e dei suoi sogni.`},
  {n:2, testo:`Un giorno Giulia scopre che tra due settimane è il compleanno del nonno Luigi. Vuole fargli una sorpresa speciale. Decide di preparare da sola una torta al cioccolato, perché il nonno la ama moltissimo.`},
  {n:3, testo:`La mattina del compleanno, Giulia si alza presto. Con la mamma va al <span class="glw" title="supermercato: grande negozio dove si vendono alimenti e prodotti per la casa">supermercato</span> a comprare gli <span class="glw" title="ingredienti: le cose necessarie per preparare una ricetta">ingredienti</span>. Comprano farina, zucchero, uova, burro e cacao.`},
  {n:4, testo:`A casa, Giulia mette gli ingredienti in una <span class="glw" title="ciotola: contenitore tondo e profondo usato in cucina per mescolare ingredienti">ciotola</span> grande. Aggiunge il <span class="glw" title="lievito: sostanza che fa gonfiare l'impasto durante la cottura">lievito</span> e mescola tutto con un cucchiaio di legno. Poi versa l'<span class="glw" title="impasto: il composto morbido ottenuto mescolando gli ingredienti">impasto</span> in una <span class="glw" title="teglia: il recipiente di metallo in cui si cuoce l'impasto nel forno">teglia</span>. La mamma la guarda sorridente senza dire una parola.`},
  {n:5, testo:`Giulia mette la teglia nel forno e aspetta. In tutta la casa si diffonde un profumo dolce di cioccolato. Dopo quaranta minuti, la torta è pronta. Giulia la lascia raffreddare sul tavolo.`},
  {n:6, testo:`Quando il nonno Luigi torna a casa, Giulia grida: «Sorpresa! Ho fatto la torta io!» Il nonno assaggia un pezzo e sorride felice. «È la cosa più buona che abbia mai mangiato», dice con gli occhi lucidi. Giulia abbraccia il nonno con tutta la forza che ha.`},
],
glossario:[
  {k:"Ingredienti", v:"Le cose necessarie per preparare una ricetta, come farina, zucchero e uova."},
  {k:"Ciotola", v:"Contenitore tondo e profondo usato in cucina per mescolare ingredienti."},
  {k:"Lievito", v:"Sostanza che fa gonfiare l'impasto durante la cottura in forno."},
  {k:"Impasto", v:"Il composto morbido ottenuto mescolando insieme gli ingredienti."},
  {k:"Teglia", v:"Il recipiente di metallo in cui si mette l'impasto per cuocerlo nel forno."},
],

// ══ PROVA 3 ═══════════════════════════════════════════════
{id:3, titolo:"La gita al lago", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Ogni anno, la classe terza della scuola media di San Rocco organizza una gita di fine anno. Quell'anno la <span class="glw" title="meta: la destinazione, il posto dove si arriva">meta</span> era il lago di Comabbio, a poca distanza dalla città. I ragazzi erano in <span class="glw" title="fermento: grande eccitazione per qualcosa che si aspetta con gioia">fermento</span> da settimane.`},
  {n:2, testo:`Il mattino della gita, il cielo era grigio e pesante. La professoressa Sala guardò le nuvole con preoccupazione, ma decise di partire lo stesso. «Un po' di pioggerella non ci spaventa!», disse con un sorriso.`},
  {n:3, testo:`Appena arrivati al lago, la pioggia smise. Sul <span class="glw" title="lungolago: la strada che costeggia le rive del lago">lungolago</span> c'erano panchine di legno e un piccolo <span class="glw" title="pontile: struttura che si estende sull'acqua, dove si attraccano le barche">pontile</span> dal quale si poteva vedere il fondo trasparente dell'acqua. Marco e Giulia si avvicinarono al bordo con cautela.`},
  {n:4, testo:`La professoressa distribuì delle schede con domande sull'<span class="glw" title="ecosistema: l'insieme degli esseri viventi e dell'ambiente in un certo luogo">ecosistema</span> del lago. I ragazzi dovevano osservare gli animali e le piante presenti. Luca scoprì una rana verde nascosta tra i <span class="glw" title="giunchi: piante acquatiche alte e sottili che crescono vicino all'acqua">giunchi</span> e la mostrò a tutti.`},
  {n:5, testo:`Dopo il pranzo al sacco, la classe si sedette sull'erba e la professoressa lesse un brano sul ciclo dell'acqua. Poi chiese ai ragazzi di scrivere due righe su quello che avevano visto. Tutti scrissero qualcosa, anche i più pigri.`},
  {n:6, testo:`Sul pullman del ritorno, i ragazzi erano stanchi ma soddisfatti. Marco disse che quella gita era stata la migliore dell'anno. La professoressa Sala sorrise e <span class="glw" title="annotò: scrisse per ricordare qualcosa di importante">annotò</span> sul registro: «Uscita riuscita. Da ripetere.»`},
],
glossario:[
  {k:"Meta", v:"La destinazione, il posto dove si arriva dopo un viaggio."},
  {k:"Fermento", v:"Grande eccitazione positiva per qualcosa che si aspetta con gioia."},
  {k:"Lungolago", v:"La strada o il vialetto che costeggia le rive di un lago."},
  {k:"Pontile", v:"Struttura di legno o metallo che si estende sull'acqua, dove si attraccano le barche."},
  {k:"Ecosistema", v:"L'insieme degli esseri viventi (piante, animali) e dell'ambiente naturale in un dato luogo."},
  {k:"Giunchi", v:"Piante acquatiche alte e sottili che crescono vicino all'acqua."},
  {k:"Annotò", v:"Scrisse per tenere memoria di qualcosa di importante."},
],

// ══ PROVA 4 ═══════════════════════════════════════════════
{id:4, titolo:"Il nuovo compagno", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Un lunedì mattina, sulla porta della classe 2B, appare un ragazzo che nessuno conosce. Si chiama Omar e ha appena cambiato scuola. Tiene la testa bassa e non dice niente. Sembra molto <span class="glw" title="imbarazzato: a disagio perché non conosce nessuno in un posto nuovo">imbarazzato</span>.`},
  {n:2, testo:`Durante la mattina, tutti lo guardano con <span class="glw" title="curiosità: grande voglia di conoscere qualcosa di nuovo">curiosità</span>, ma nessuno gli parla. Omar siede al banco vicino alla finestra. Ogni tanto guarda gli altri ragazzi e poi abbassa gli occhi. La mattina passa lentamente.`},
  {n:3, testo:`Quando suona la campanella dell'<span class="glw" title="intervallo: la pausa tra le ore di lezione">intervallo</span>, Omar rimane seduto al suo posto. Tutti escono a fare merenda, tranne Sara. Sara è una ragazza curiosa e gentile. Decide di avvicinarsi a lui e gli dice: «Ciao, io mi chiamo Sara. Come ti chiami?»`},
  {n:4, testo:`Omar risponde piano: «Mi chiamo Omar.» Sara vede che nel suo zaino c'è un fumetto di Dragon Ball. «Anche io ho quelli!» dice Sara con gli occhi spalancati. I due iniziano a parlare dei loro personaggi preferiti e dimenticano che era l'ora della merenda.`},
  {n:5, testo:`Nel pomeriggio, l'insegnante propone un lavoro di gruppo: bisogna preparare un <span class="glw" title="cartellone: un foglio grande su cui si scrivono informazioni su un argomento">cartellone</span> su Roma antica. Sara dice subito: «Io lavoro con Omar!» I due <span class="glw" title="collaborano: lavorano insieme verso lo stesso obiettivo">collaborano</span>: Omar disegna bene, Sara scrive i testi. Il cartellone viene molto bello.`},
  {n:6, testo:`Alla fine della giornata, mentre escono dalla scuola, Omar dice a Sara: «Grazie. Pensavo che non avrei trovato nessun amico qui.» Sara sorride e risponde: «Domani ti presento anche gli altri.» Omar sorride per la prima volta da quando è arrivato.`},
],
glossario:[
  {k:"Imbarazzato", v:"A disagio, in difficoltà perché non si conosce nessuno in un posto nuovo."},
  {k:"Curiosità", v:"Grande voglia di conoscere o sapere qualcosa di nuovo."},
  {k:"Intervallo", v:"La pausa tra le ore di lezione, di solito di dieci o quindici minuti."},
  {k:"Cartellone", v:"Un foglio grande su cui si scrivono e disegnano informazioni su un argomento."},
  {k:"Collaborano", v:"Lavorano insieme, ognuno facendo la propria parte per raggiungere lo stesso obiettivo."},
],

// ══ PROVA 5 ═══════════════════════════════════════════════
{id:5, titolo:"La casa sull'albero", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Matteo ha undici anni e in fondo al giardino di casa sua c'è un grande <span class="glw" title="quercia: albero molto grande e robusto, con foglie verdi e ghiande">quercia</span> con i rami larghi e forti. Da quando era piccolo sognava di costruire una casa su quell'albero. L'estate scorsa, finalmente, il nonno Ettore ha detto sì.`},
  {n:2, testo:`Il nonno Ettore è un <span class="glw" title="falegname: persona che lavora il legno e costruisce mobili o strutture">falegname</span> in pensione. Conosce il legno come le sue tasche. Ha spiegato a Matteo che per costruire la casa servono assi di legno, chiodi, una scala e tanta <span class="glw" title="pazienza: la capacità di aspettare e di continuare anche quando le cose sono difficili">pazienza</span>.`},
  {n:3, testo:`La migliore amica di Matteo, Giulia, è venuta ad aiutare ogni pomeriggio. I tre hanno lavorato per due settimane intere. Matteo reggeva i pezzi di legno, Giulia li contava e li misurava, il nonno li inchiodava uno a uno con il martello.`},
  {n:4, testo:`A volte i pezzi non si incastravano bene e bisognava ricominciare. Matteo si <span class="glw" title="scoraggiava: perdeva la voglia di continuare perché le cose erano difficili">scoraggiava</span>. Ma il nonno diceva sempre: «Chi lascia la strada vecchia per la nuova, sa quel che lascia e non sa quel che trova. Continuiamo.»`},
  {n:5, testo:`Dopo quattordici giorni di lavoro, la casetta era pronta. Aveva un tetto di <span class="glw" title="compensato: tipo di legno sottile e leggero, formato da strati incollati insieme">compensato</span>, una finestrella, una porta piccola e una scala a pioli per salire. Matteo e Giulia salirono insieme per primi. Da lassù si vedeva tutto il giardino.`},
  {n:6, testo:`Quella sera, prima di cena, Matteo abbracciò il nonno e disse: «Grazie, nonno. La casa è bella, ma la cosa più bella è stata costruirla con te.» Il nonno sorrise e rispose: «È quello che speravo sentire, Matteo.»`},
],
glossario:[
  {k:"Quercia", v:"Albero molto grande e robusto, con foglie verdi e ghiande."},
  {k:"Falegname", v:"Persona che lavora il legno e costruisce mobili o strutture."},
  {k:"Pazienza", v:"La capacità di aspettare e di continuare anche quando le cose sono difficili."},
  {k:"Scoraggiava", v:"Perdeva la voglia di continuare perché le cose erano difficili."},
  {k:"Compensato", v:"Tipo di legno sottile e leggero, formato da strati incollati insieme."},
],

// ══ PROVA 6 ═══════════════════════════════════════════════
{id:6, titolo:"Il gatto di Miriam", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Miriam ha dieci anni e vive al quarto piano di un condominio in città. Il suo gatto si chiama Neve perché ha il pelo completamente bianco. Neve dorme sempre sul cuscino accanto a Miriam e la segue in ogni stanza della casa.`},
  {n:2, testo:`Una sera d'inverno, un temporale molto forte si <span class="glw" title="abbatté: si scatenò con forza improvvisa">abbatté</span> sulla città. I tuoni erano forti e i lampi illuminavano le finestre. Neve, spaventata, si nascose sotto il letto di Miriam e non voleva uscire. Miriam cercò di <span class="glw" title="calmarla: farla sentire tranquilla e sicura">calmarla</span> accarezzandola piano.`},
  {n:3, testo:`La mattina dopo, il temporale era passato. Ma Neve non c'era più. Miriam la cercò in tutta la casa: sotto i letti, dentro gli armadi, dietro i divani. Niente. La gatta era scomparsa. Miriam cominciò a piangere.`},
  {n:4, testo:`La mamma <span class="glw" title="consolò: aiutò Miriam a sentirsi meno triste">consolò</span> Miriam e la aiutò a cercare. Bussarono alle porte dei vicini del piano. La signora del piano di sopra disse di non aver visto nessun gatto. Il signore del piano di sotto aveva sentito un miagolio la mattina presto, vicino alla sua porta.`},
  {n:5, testo:`Miriam e la mamma scesero al piano di sotto e aprirono con cautela la porta del corridoio. Là, rannicchiata in un angolo buio vicino al <span class="glw" title="termosifone: il radiatore, il sistema di riscaldamento a muro">termosifone</span>, c'era Neve. Tremava ancora un poco, ma quando vide Miriam, si alzò e le andò incontro.`},
  {n:6, testo:`Miriam la prese in braccio e la strinse forte. «Non scappare più, Neve», le disse sottovoce. Quella sera, la gatta dormì sul cuscino di Miriam più vicina del solito. Il temporale era solo un ricordo.`},
],
glossario:[
  {k:"Abbatté", v:"Si scatenò con forza improvvisa, come una tempesta."},
  {k:"Calmarla", v:"Farla sentire tranquilla e sicura."},
  {k:"Consolò", v:"Aiutò a sentirsi meno triste."},
  {k:"Termosifone", v:"Il radiatore, il sistema di riscaldamento a muro (chiamato anche calorifero o termosifone)."},
],

// ══ PROVA 7 ═══════════════════════════════════════════════
{id:7, titolo:"Il quaderno di Ahmed", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Ahmed è arrivato in Italia sei mesi fa dal Marocco. Frequenta la classe seconda media e ogni giorno impara parole nuove in italiano. Porta sempre con sé un quaderno verde su cui scrive le parole che non capisce insieme alla loro traduzione.`},
  {n:2, testo:`Un mercoledì mattina, Ahmed cerca il quaderno verde nello zaino. Non c'è. Lo cerca dappertutto: nel banco, nel cortile, in bagno. <span class="glw" title="Disperato: molto triste e senza speranza">Disperato</span>, si siede al suo posto e guarda fuori dalla finestra. Quella mattina non riesce a seguire la lezione.`},
  {n:3, testo:`La professoressa di italiano, la signora Martini, si accorge che Ahmed è triste. Alla fine della lezione lo chiama in disparte e lui le spiega del quaderno. La professoressa <span class="glw" title="annuisce: fa sì con la testa per dire di capire o di essere d'accordo">annuisce</span> e dice: «Oggi pomeriggio, dopo la scuola, lo cerchiamo insieme.»`},
  {n:4, testo:`Nel pomeriggio, i compagni di Ahmed vengono a sapere della storia del quaderno. Valeria propone di cercare nella palestra, perché Ahmed ha fatto ginnastica il giorno prima. Marco controlla in segreteria, in caso qualcuno lo avesse <span class="glw" title="consegnato: portato a qualcuno che possa restituirlo al proprietario">consegnato</span>.`},
  {n:5, testo:`È Valeria a trovarlo: il quaderno era scivolato dietro una panca dello spogliatoio della palestra. Le pagine erano un po' stropicce, ma le parole erano leggibili. Ahmed prese il quaderno tra le mani e lo aprì alla prima pagina.`},
  {n:6, testo:`Alla prima pagina c'era una scritta in arabo e, sotto, la traduzione italiana: «Le parole sono ponti. Chi le impara cammina più lontano.» Ahmed sorrise. Strinse la mano a Valeria e disse a tutti: «Grazie. Con voi l'italiano lo imparo anche fuori dal quaderno.»`},
],
glossario:[
  {k:"Disperato", v:"Molto triste e senza speranza di risolvere un problema."},
  {k:"Annuisce", v:"Fa sì con la testa per dire di capire o di essere d'accordo."},
  {k:"Consegnato", v:"Portato a qualcuno che possa restituirlo al proprietario."},
  {k:"Stropicce", v:"Un po' piegate e arricciate, non perfettamente lisce."},
],

// ══ PROVA 8 ═══════════════════════════════════════════════
{id:8, titolo:"La bicicletta rossa", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Luca ha undici anni e da tre mesi mette da parte i soldi della <span class="glw" title="paghetta: una piccola somma di denaro che i genitori danno ai figli ogni settimana">paghetta</span>. Il suo sogno è comprare una bicicletta rossa che ha visto nella vetrina della bottega in fondo alla via. Costa ottantadue euro. Ne manca ancora qualcuno, ma ci è quasi.`},
  {n:2, testo:`Un sabato mattina, Luca conta i soldi sul tavolo della cucina: ottantaquattro euro. Ce la fa. Con il cuore che batte forte, prende il portafoglio e cammina fino alla bottega. La bicicletta rossa è ancora lì, in vetrina, che lo aspetta.`},
  {n:3, testo:`Luca compra la bicicletta. Il negoziante la tira fuori e la porta sul <span class="glw" title="marciapiede: il bordo rialzato della strada riservato ai pedoni">marciapiede</span>. È ancora più bella da vicino. Luca la tocca con le dita e sorride. Non riesce a smettere di guardarla.`},
  {n:4, testo:`A casa, sua sorella Sofia di nove anni corre verso di lui: «Che bella! Me la lasci provare?» Luca esita un momento, poi sorride e risponde: «Va bene, Sofia. Ma vai piano.» Sofia sale sulla bicicletta e parte felice lungo il vialetto del giardino.`},
  {n:5, testo:`Dopo qualche minuto, Sofia torna con la bicicletta e una faccia <span class="glw" title="mortificata: molto dispiaciuta e in imbarazzo per aver fatto qualcosa di brutto">mortificata</span>. «Luca, mi dispiace. Ho preso una buca e la ruota davanti è <span class="glw" title="bucata: forata, non tiene più l'aria">bucata</span>.» Luca guarda la ruota. Il sorriso scompare per un momento.`},
  {n:6, testo:`Poi Luca prende un respiro e dice: «Va bene, Sofia. Gli incidenti capitano. Andiamo a comprare il kit per riparare la camera d'aria.» I due fratelli vanno insieme in bottega e riparano la ruota nel pomeriggio. La bicicletta torna come nuova. E Luca capisce che aveva ancora voglia di sorridere.`},
],
glossario:[

  {k:"Marciapiede", v:"Il bordo rialzato della strada riservato ai pedoni."},
  {k:"Mortificata", v:"Molto dispiaciuta e in imbarazzo per aver fatto qualcosa di brutto."},
  {k:"Bucata", v:"Forata: la ruota ha un buco e non tiene più l'aria dentro."},
],

// ══ PROVA 9 ═══════════════════════════════════════════════
{id:9, titolo:"La nonna di Chiara", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Ogni venerdì pomeriggio, Chiara va a trovare la nonna Rosa. La nonna abita in un piccolo appartamento al piano terra, con un balcone pieno di <span class="glw" title="gerani: piante da fiore, molto colorate, tipiche dei balconi italiani">gerani</span> rossi. Appena Chiara suona il campanello, la nonna apre subito, come se l'avesse aspettata sulla soglia.`},
  {n:2, testo:`Quel venerdì, la nonna Rosa ha preparato gli ingredienti per fare la pasta fresca. Sul tavolo ci sono la farina, le uova e un mattarello di legno vecchio che è sempre stato in famiglia. «Oggi ti insegno a fare i <span class="glw" title="tagliolini: pasta fresca tagliata a strisce sottili">tagliolini</span>», dice la nonna con un sorriso.`},
  {n:3, testo:`Prima di tutto bisogna fare la fontana: mettere la farina a <span class="glw" title="mucchio: un insieme di cose ammassate insieme">mucchio</span> sul tavolo, aprire un buco al centro e versarci le uova dentro. Chiara segue le istruzioni con attenzione. Le mani si sporcano di farina e lei ride.`},
  {n:4, testo:`Poi bisogna impastare a lungo, con le mani, finché il <span class="glw" title="composto: la miscela di ingredienti mescolati insieme">composto</span> diventa liscio ed elastico. È la parte più faticosa. Chiara spinge e gira l'impasto sul tavolo. Le braccia le fanno già male, ma non vuole fermarsi.`},
  {n:5, testo:`Dopo che l'impasto è pronto, la nonna lo <span class="glw" title="stende: appiattisce l'impasto con il mattarello fino a renderlo sottile">stende</span> con il mattarello fino a ottenere una sfoglia sottile. Poi arrotola la sfoglia e la taglia a strisce strette. Ecco i tagliolini. Chiara li guarda come se fossero un <span class="glw" title="capolavoro: un'opera fatta molto bene, di cui si può essere orgogliosi">capolavoro</span>.`},
  {n:6, testo:`A cena, i tagliolini vengono serviti con il sugo della nonna. Chiara ne mangia due piatti. Poi dice: «Nonna, quando tornerò, me li insegni di nuovo?» La nonna ride e risponde: «Tutte le volte che vuoi, Chiara mia.»`},
],
glossario:[
  {k:"Gerani", v:"Piante da fiore molto colorate, tipiche dei balconi italiani."},
  {k:"Tagliolini", v:"Pasta fresca tagliata a strisce sottili."},
  {k:"Mucchio", v:"Un insieme di cose ammassate insieme."},
  {k:"Composto", v:"La miscela di ingredienti mescolati insieme."},
  {k:"Stende", v:"Appiattisce l'impasto con il mattarello fino a renderlo sottile."},
  {k:"Capolavoro", v:"Un'opera fatta molto bene, di cui si può essere orgogliosi."},
],
domande:[
  {n:1,par:1,tipo:"sm",sez:0,testo:"Quando va a trovare la nonna Chiara?",opts:["Ogni lunedì mattina","Ogni mercoledì pomeriggio","Ogni venerdì pomeriggio","Ogni domenica"],ok:2},
  {n:2,par:2,tipo:"sm",sez:0,testo:"Cosa insegna la nonna Rosa a Chiara quel pomeriggio?",opts:["A fare le pizze","A fare i tagliolini freschi","A fare la torta al cioccolato","A fare il risotto"],ok:1},
  {n:3,par:3,tipo:"sm",sez:0,testo:"Cosa si fa prima di tutto per la pasta?",opts:["Si cuoce l'acqua con il sale","Si mette l'impasto nel frigorifero","Si fa la fontana di farina con un buco al centro per le uova","Si taglia la pasta a strisce"],ok:2},
  {n:4,par:4,tipo:"sm",sez:0,testo:"Come si sente Chiara mentre impasta?",opts:["Si annoia facilmente","Le fanno male le braccia ma non vuole fermarsi","Ha paura di sbagliare","È stanca e smette presto"],ok:1},
  {n:5,par:5,tipo:"sm",sez:0,testo:"Cosa fa la nonna con l'impasto dopo averlo steso?",opts:["Lo mette nel forno","Lo arrotola e lo taglia a strisce per fare i tagliolini","Lo lascia riposare tutta la notte","Lo divide in pezzetti piccoli"],ok:1},
  {n:6,par:0,tipo:"vf",sez:0,testo:"Segna V se l'affermazione è vera, F se è falsa.",
    righeVF:[{t:"La nonna Rosa vive al piano terra con un balcone pieno di gerani.",ok:true},{t:"Chiara impasta con una macchina elettrica.",ok:false},{t:"Chiara mangia due piatti di tagliolini a cena.",ok:true}]},
  {n:7,par:6,tipo:"sm",sez:0,testo:"Cosa chiede Chiara alla fine della cena?",opts:["Di portare i tagliolini a casa","Di imparare un'altra ricetta subito","Di tornare per imparare di nuovo a fare i tagliolini","Di rimanere a dormire dalla nonna"],ok:2},
  {n:8,par:0,tipo:"sm",sez:0,testo:"Qual è il tema principale del racconto?",opts:["Come si fa la pasta fresca in modo corretto","Il legame affettivo tra nonna e nipote","La tradizione culinaria italiana","Il lavoro faticoso in cucina"],ok:1},
  {n:9,par:5,tipo:"sm",sez:1,testo:'La parola "stende" nel testo significa:',opts:["Fa riposare l'impasto","Mette in frigorifero","Appiattisce con il mattarello fino a renderlo sottile","Cuoce in forno"],ok:2},
  {n:10,par:5,tipo:"sm",sez:1,testo:'Chiara guarda i tagliolini «come se fossero un capolavoro». Cosa significa "capolavoro"?',opts:["Qualcosa di troppo difficile da fare","Un'opera fatta molto bene, di cui essere orgogliosi","Il piatto preferito dalla nonna","Il nome di una ricetta famosa"],ok:1},

    righeVF:[{t:"La nonna usa un mattarello di legno vecchio di famiglia.",ok:true},{t:"Chiara trova facile impastare la pasta.",ok:false},{t:"La nonna dice che insegnerà a Chiara tutte le volte che vuole.",ok:true}]},
  {n:12,par:1,tipo:"sm",sez:2,tip:"Chiedi: chi suona il campanello?",testo:'Leggi: «Appena Chiara suona il campanello, la nonna apre subito.» Qual è il soggetto della prima frase?',opts:["Il campanello","La nonna","Chiara","Subito"],ok:2},
  {n:13,par:4,tipo:"sm",sez:2,tip:"Il predicato verbale è il verbo. Chiedi: cosa fa Chiara?",testo:'Leggi: «Chiara spinge e gira l\'impasto sul tavolo.» Quali sono i predicati verbali?',opts:["Chiara e il tavolo","Spinge e gira","L'impasto","Sul tavolo"],ok:1},
  {n:14,par:2,tipo:"sm",sez:2,tip:"Chiedi: la nonna ha preparato cosa?",testo:'Leggi: «La nonna Rosa ha preparato gli ingredienti.» Qual è il complemento oggetto?',opts:["La nonna Rosa","Ha preparato","Gli ingredienti","Il mattarello"],ok:2},
  {n:15,par:3,tipo:"sm",sez:1,testo:'Nel testo si legge che «le mani si sporcano di farina». Qual è il contrario di "sporcare"?',opts:["Lavare","Pulire","Asciugare","Colorare"],ok:1},

// ══ PROVA 10 ═══════════════════════════════════════════════
{id:10, titolo:"L'aquilone di Tommaso", sottotitolo:"Testo narrativo",
paragrafi:[
  {n:1, testo:`Tommaso ha undici anni e suo padre gli ha regalato un aquilone per il compleanno. È grande, di <span class="glw" title="nylon: materiale sintetico, leggero e resistente">nylon</span> azzurro e giallo, con una coda lunga tre metri. Quella domenica di marzo, il vento soffia <span class="glw" title="sostenuto: continuo e abbastanza forte">sostenuto</span>: è il giorno perfetto per provarlo.`},
  {n:2, testo:`Tommaso e il papà vanno al parco con l'aquilone. Il papà mostra al figlio come tenerlo: «Prima lo alzi con le braccia, poi lo lasci andare e tieni la cordicella tesa, mai troppo, mai troppo poca.» Tommaso ascolta con attenzione.`},
  {n:3, testo:`Al primo tentativo, l'aquilone sale un poco e poi ricade. Al secondo, sale più in alto ma <span class="glw" title="piroetta: gira su sé stesso velocemente">piroetta</span> su sé stesso e scende di lato. Tommaso non si scoraggia. Al terzo tentativo, l'aquilone sale, sale, sale e rimane su, stabile, a cinquanta metri d'altezza.`},
  {n:4, testo:`Per venti minuti, Tommaso fa <span class="glw" title="manovrare: guidare e controllare qualcosa, come un aquilone o un veicolo">manovrare</span> l'aquilone nel cielo. Lo vede salire, <span class="glw" title="planare: scendere lentamente, come un uccello con le ali aperte">planare</span>, salire ancora. È felicissimo. Poi un colpo di vento forte lo spinge di lato verso un albero.`},
  {n:5, testo:`L'aquilone si <span class="glw" title="impigliò: si bloccò, rimase intrappolato tra i rami">impigliò</span> tra i rami di un pino alto. La coda penzolava in basso, ma il corpo dell'aquilone era troppo in alto per essere raggiunto. Tommaso guardò suo padre con gli occhi tristi.`},
  {n:6, testo:`Un signore anziano che passeggiava con il cane si fermò ad osservare. «Ho una scala nel mio furgone», disse. «Se volete, proviamo.» Con l'aiuto della scala, il papà di Tommaso riuscì a liberare l'aquilone dai rami. Tommaso ringraziò il signore e salutò anche il cane. Poi tornò a fare volare l'aquilone, stavolta stando lontano dagli alberi.`},
],
glossario:[
  {k:"Nylon", v:"Materiale sintetico, leggero e resistente, usato per fare aquiloni e impermeabili."},
  {k:"Sostenuto", v:"Continuo e abbastanza forte (detto del vento)."},
  {k:"Piroetta", v:"Gira su sé stesso velocemente, come un ballerino."},
  {k:"Manovrare", v:"Guidare e controllare qualcosa, come un aquilone o un veicolo."},
  {k:"Planare", v:"Scendere lentamente tenendo le ali aperte, come un uccello o un aeroplano."},
  {k:"Impigliò", v:"Si bloccò, rimase intrappolato tra i rami."},
],
domande:[
  {n:1,par:1,tipo:"sm",sez:0,testo:"Che regalo ha ricevuto Tommaso?",opts:["Una bicicletta","Un aquilone azzurro e giallo","Un telescopio","Un drone"],ok:1},
  {n:2,par:1,tipo:"sm",sez:0,testo:"Perché quella domenica di marzo è il giorno perfetto?",opts:["Perché è il suo compleanno","Perché il sole splende forte","Perché il vento soffia sostenuto","Perché il parco è vuoto"],ok:2},
  {n:3,par:3,tipo:"sm",sez:0,testo:"Al terzo tentativo, cosa succede all'aquilone?",opts:["Ricade di nuovo","Piroetta e scende","Sale e rimane su, stabile","Si impiglia subito in un albero"],ok:2},
  {n:4,par:4,tipo:"sm",sez:0,testo:"Per quanti minuti Tommaso fa manovrare l'aquilone nel cielo?",opts:["Cinque minuti","Dieci minuti","Quindici minuti","Venti minuti"],ok:3},
  {n:5,par:5,tipo:"sm",sez:0,testo:"Dove si impigliò l'aquilone?",opts:["In un cespuglio basso","Tra i rami di un pino alto","Sul tetto di un edificio","In una rete da tennis"],ok:1},
  {n:6,par:0,tipo:"vf",sez:0,testo:"Segna V se l'affermazione è vera, F se è falsa.",
    righeVF:[{t:"Tommaso e il papà vanno al parco insieme.",ok:true},{t:"L'aquilone si impiglia subito al primo tentativo.",ok:false},{t:"Un signore anziano aiuta a liberare l'aquilone.",ok:true}]},
  {n:7,par:6,tipo:"sm",sez:0,testo:"Come fu liberato l'aquilone dall'albero?",opts:["Il papà scalò l'albero","Tagliarono la coda dell'aquilone","Un signore anziano portò una scala dal furgone","L'aquilone cadde da solo dopo poco"],ok:2},
  {n:8,par:0,tipo:"sm",sez:0,testo:"Quale lezione impara Tommaso alla fine?",opts:["Gli aquiloni non si usano vicino agli alberi","Bisogna sempre chiedere aiuto subito","La perseveranza porta al successo ma bisogna anche imparare dagli errori","Gli aquiloni di nylon sono i migliori"],ok:2},
  {n:9,par:1,tipo:"sm",sez:1,testo:'La parola "sostenuto" applicata al vento significa:',opts:["Improvviso e violento","Debolissimo e leggero","Continuo e abbastanza forte","Freddo e umido"],ok:2},
  {n:10,par:5,tipo:"sm",sez:1,testo:'L\'aquilone "si impigliò tra i rami". Cosa significa?',opts:["Scivolò giù velocemente","Si bloccò, rimase intrappolato","Volò ancora più in alto","Si aprì completamente"],ok:1},
  {n:11,par:0,tipo:"vf",sez:0,testo:"Segna V se l'affermazione è vera, F se è falsa.",
    righeVF:[{t:"L'aquilone è di nylon azzurro e giallo.",ok:true},{t:"Al primo tentativo l'aquilone sale subito molto in alto.",ok:false},{t:"Alla fine Tommaso ricomincia a far volare l'aquilone stando lontano dagli alberi.",ok:true}]},
  {n:12,par:2,tipo:"sm",sez:2,tip:"Chiedi: chi mostra?",testo:'Leggi: «Il papà mostra al figlio come tenerlo.» Qual è il soggetto?',opts:["Il figlio","Mostra","Il papà","Come tenerlo"],ok:2},
  {n:13,par:3,tipo:"sm",sez:2,tip:"Il predicato verbale è il verbo. Chiedi: cosa fa l'aquilone?",testo:'Leggi: «L\'aquilone sale, sale, sale e rimane su.» Quali sono i predicati verbali?',opts:["L'aquilone","Sale e rimane","Stabile","A cinquanta metri"],ok:1},
  {n:14,par:6,tipo:"sm",sez:2,tip:"Chiedi: Tommaso ringraziò chi?",testo:'Leggi: «Tommaso ringraziò il signore.» Qual è il complemento oggetto?',opts:["Tommaso","Ringraziò","Il signore","Il cane"],ok:2},
  {n:15,par:4,tipo:"sm",sez:1,testo:'Nel testo l\'aquilone "planava". Cosa significa "planare"?',opts:["Cadere velocemente verso il basso","Girare su sé stesso rapidamente","Scendere lentamente tenendo le ali aperte","Andare avanti in linea retta"],ok:2},
]},


// ══ PROVA 11 — CAA: La colazione di Marco ═══════════════════
{id:11, titolo:"La colazione di Marco", sottotitolo:"Testo in CAA",
paragrafi:[
  {n:1, testo:`Marco si sveglia la mattina presto. Apre gli <span class="glw" title="occhi: organi con cui si vede">occhi</span> e guarda fuori dalla <span class="glw" title="finestra: apertura nel muro con il vetro">finestra</span>. Il sole è già alto nel cielo azzurro. Marco ha <span class="glw" title="fame: sensazione di voler mangiare">fame</span>. Si alza dal <span class="glw" title="letto: mobile su cui si dorme">letto</span> e mette le ciabatte ai piedi. Va in cucina dalla sua mamma.`},
  {n:2, testo:`In cucina c'è un bel profumo dolce. Sul <span class="glw" title="tavolo: mobile su cui si mangia">tavolo</span> la mamma ha preparato la colazione. Ci sono il <span class="glw" title="latte: bevanda bianca che viene dalla mucca">latte</span> bianco, i <span class="glw" title="biscotti: dolci secchi che si mangiano a colazione">biscotti</span> al cioccolato e una <span class="glw" title="banana: frutto giallo e dolce">banana</span> gialla. Marco è contento. Si siede sulla sedia. Prende la tazza grande a righe blu.`},
  {n:3, testo:`La mamma scalda il latte sul <span class="glw" title="fornello: parte della cucina dove si cuoce il cibo con il fuoco">fornello</span>. Il latte è bianco e caldo. Marco lo versa nella <span class="glw" title="tazza: contenitore con il manico per bere">tazza</span> con attenzione. Poi aggiunge i biscotti uno per uno. Mescola tutto con il <span class="glw" title="cucchiaio: posata lunga usata per mescolare e mangiare">cucchiaio</span>. L'odore è buono e dolce.`},
  {n:4, testo:`Marco mangia la colazione piano piano. I biscotti sono morbidi e buoni nel latte caldo. La <span class="glw" title="banana: frutto giallo e dolce">banana</span> è dolce e profumata. Marco beve tutto il latte con soddisfazione. La mamma lo guarda e sorride. È contenta di vedere suo figlio mangiare bene e con calma.`},
  {n:5, testo:`Dopo la colazione Marco lava la tazza nell'<span class="glw" title="acquaio: lavandino della cucina dove si lavano i piatti">acquaio</span>. La mette ad asciugare sul ripiano. Poi prende il suo <span class="glw" title="zaino: borsa che si porta in spalla per andare a scuola">zaino</span> rosso. Dentro ci sono i libri, i quaderni e l'astuccio con le matite colorate. Marco controlla che ci sia tutto con cura.`},
  {n:6, testo:`La mamma aiuta Marco a mettersi il <span class="glw" title="cappotto: giacca lunga e calda per l'inverno">cappotto</span> pesante. Fuori fa freddo e c'è vento forte. Marco mette anche il <span class="glw" title="berretto: copricapo di lana che si mette in testa d'inverno">berretto</span> di lana in testa. La mamma lo bacia sulla guancia con affetto. Marco sorride felice e dice: «Ciao mamma!». Esce di casa e cammina contento verso la scuola.`},
],
glossario:[
  {k:"Fame", v:"La sensazione di voler mangiare qualcosa perché lo stomaco è vuoto."},
  {k:"Latte", v:"Bevanda bianca che viene dalla mucca. Si beve spesso a colazione."},
  {k:"Biscotti", v:"Dolci secchi che si mangiano di solito a colazione nel latte."},
  {k:"Tazza", v:"Contenitore con il manico che si usa per bere il latte o il tè."},
  {k:"Zaino", v:"Borsa che si porta sulle spalle per portare i libri a scuola."},
  {k:"Cappotto", v:"Giacca lunga e calda che si mette d'inverno quando fa freddo."},
  {k:"Berretto", v:"Copricapo di lana che protegge la testa dal freddo."},
],

  {n:15,par:6,tipo:"sm",sez:2,tip:"Il complemento oggetto risponde alla domanda: aiuta chi?",testo:"Leggi: «La mamma aiuta Marco.» Qual è il complemento oggetto?",opts:["La mamma","Aiuta","Il cappotto","Marco"],ok:3},

// ══ PROVA 12 — CAA: Al parco con Bello ══════════════════════
{id:12, titolo:"Al parco con Bello", sottotitolo:"Testo in CAA",
paragrafi:[
  {n:1, testo:`Sofia ha nove anni e vive in un palazzo in città. Ogni sabato mattina sua mamma la porta al <span class="glw" title="parco: spazio verde con alberi e giochi all'aperto">parco</span> vicino a casa. Sofia aspetta questo momento tutta la settimana. Nel parco può correre libera sull'<span class="glw" title="erba: pianta verde bassa che copre il suolo del parco">erba</span> verde. Può giocare con gli altri bambini. Può stare all'aria aperta.`},
  {n:2, testo:`Oggi Sofia porta con sé il suo <span class="glw" title="cane: animale domestico fedele all'uomo">cane</span> Bello. Bello è un cane grande con il pelo marrone e gli occhi neri. È molto energico e vuole sempre giocare. Quando arriva al parco tira il <span class="glw" title="guinzaglio: corda che si usa per tenere il cane">guinzaglio</span> forte. Vuole subito correre sul prato. Sofia ride e lo segue di corsa.`},
  {n:3, testo:`Sofia lancia il <span class="glw" title="pallone: palla gonfiata d'aria usata per giocare">pallone</span> rosso lontano sul prato verde. Bello corre velocissimo con le zampe sul terreno. Lo prende in bocca con cura e delicatezza. Poi corre felice verso Sofia scodinzolando. Glielo porta ai piedi come un bravo cane. Sofia lo <span class="glw" title="accarezza: tocca con dolcezza con la mano">accarezza</span> sulla testa.`},
  {n:4, testo:`Dopo tanto giocare Bello ha <span class="glw" title="sete: sensazione di voler bere">sete</span>. Sofia gli dà l'acqua dalla sua <span class="glw" title="borraccia: contenitore per portare l'acqua">borraccia</span>. Bello beve con lunghe sorsate rumorose. L'acqua gli cola dal muso sul prato. Poi si sdraia sull'erba fresca a riposare. Ansima piano con la lingua di fuori.`},
  {n:5, testo:`Nel parco Sofia incontra una bambina che si chiama Anna. Anna ha i capelli biondi e una maglietta azzurra. Ha anche lei un cane piccolo che si chiama Fiocco. I due cani si annusano e diventano subito amici. Sofia e Anna ridono e iniziano a giocare insieme sull'altalena del parco.`},
  {n:6, testo:`Quando il sole comincia a scendere la mamma chiama Sofia. È ora di tornare a <span class="glw" title="casa: il posto dove si abita con la propria famiglia">casa</span>. Sofia saluta Anna e le dà il suo numero di telefono. Le dice: «Ci vediamo sabato prossimo!». Sofia torna a casa stanca ma molto felice. Bello cammina tranquillo al suo fianco.`},
],
glossario:[

  {k:"Guinzaglio", v:"Corda o cinghia che si aggancia al collare del cane per tenerlo."},

  {k:"Borraccia", v:"Contenitore di plastica o metallo per portare l'acqua con sé."},
  {k:"Casa", v:"Il posto dove si abita, dove c'è la propria famiglia."},
],

// ══ PROVA 13 — CAA: La pioggia di Luca ══════════════════════
{id:13, titolo:"La pioggia di Luca", sottotitolo:"Testo in CAA",
paragrafi:[
  {n:1, testo:`Questa mattina il <span class="glw" title="cielo: la parte alta sopra di noi, dove ci sono le nuvole e il sole">cielo</span> è grigio e pesante. Ci sono molte <span class="glw" title="nuvole: masse di vapore d'acqua che si vedono in cielo">nuvole</span> scure che coprono il sole. L'aria fuori è umida e fredda. Luca guarda fuori dalla finestra della sua camera. Vede le prime <span class="glw" title="gocce: piccole quantità di liquido di forma tonda">gocce</span> di pioggia cadere sul vetro. Sta per piovere forte.`},
  {n:2, testo:`Luca prende il suo <span class="glw" title="impermeabile: giacca speciale che non si bagna con la pioggia">impermeabile</span> giallo dall'attaccapanni. Prende anche gli <span class="glw" title="stivali: scarpe alte che proteggono i piedi dall'acqua e dal fango">stivali</span> rossi di gomma dall'ingresso. Si veste con cura e si abbottona tutto. La mamma lo aiuta ad allacciare bene gli stivali. Fuori la pioggia cade forte e veloce sul marciapiede bagnato. Luca è pronto per uscire.`},
  {n:3, testo:`Luca esce in <span class="glw" title="giardino: spazio verde vicino a casa con erba e piante">giardino</span> sotto la pioggia fitta. Salta nelle <span class="glw" title="pozzanghere: raccolte d'acqua sul terreno dopo la pioggia">pozzanghere</span> con i suoi stivali rossi. L'acqua schizza dappertutto intorno a lui. Luca ride forte e si diverte tantissimo. La sua mamma lo guarda dalla finestra calda. Scuote la testa sorridendo con affetto.`},
  {n:4, testo:`Dopo un po' la pioggia smette di colpo. Il sole riappare lentamente tra le nuvole bianche. Nell'aria c'è un bel profumo fresco di terra bagnata. Nel cielo appare un bellissimo <span class="glw" title="arcobaleno: fascia colorata che appare in cielo dopo la pioggia">arcobaleno</span>. Luca lo indica con il dito verso sua mamma. I colori sono rosso, arancione, giallo, verde, blu e viola.`},
  {n:5, testo:`Luca raccoglie delle <span class="glw" title="foglie: parti piatte e verdi delle piante">foglie</span> bagnate che sono cadute dagli alberi in giardino. Alcune sono gialle, altre arancioni e alcune brune. Le porta dentro casa per mostrarle con orgoglio alla sua mamma. La mamma dice che sono bellissime e colorate. Decidono insieme di usarle per fare un disegno creativo su un foglio grande.`},
  {n:6, testo:`La sera Luca si siede al suo <span class="glw" title="tavolo: mobile su cui si mangia e si studia">tavolo</span> e disegna sul suo quaderno. Disegna la pioggia, l'arcobaleno colorato e le pozzanghere del giardino. Colora tutto con cura usando le matite colorate. Poi scrive sotto il disegno: «Oggi mi è piaciuta la pioggia!». La mamma legge e lo abbraccia forte. È una bella giornata da ricordare.`},
],
glossario:[
  {k:"Nuvole", v:"Masse di vapore d'acqua che si vedono nel cielo, spesso grigie prima della pioggia."},
  {k:"Impermeabile", v:"Giacca speciale che non lascia passare l'acqua della pioggia."},
  {k:"Stivali", v:"Scarpe alte di gomma che proteggono i piedi dall'acqua e dal fango."},
  {k:"Pozzanghere", v:"Raccolte di acqua che si formano sul terreno dopo che piove."},
  {k:"Arcobaleno", v:"Fascia di colori che appare nel cielo dopo la pioggia quando c'è il sole."},
  {k:"Foglie", v:"Le parti piatte e verdi (o colorate in autunno) delle piante e degli alberi."},
  {k:"Giardino", v:"Spazio verde vicino a una casa con erba, piante e fiori."},
],

// ══ PROVA 14 — CAA: Il cane e il pallone ════════════════════
{id:14, titolo:"Il cane e il pallone", sottotitolo:"Testo in CAA",
paragrafi:[
  {n:1, testo:`Filippo ha un <span class="glw" title="cane: animale domestico fedele all'uomo">cane</span> che si chiama Bello. Bello è un cane grande e morbido con il pelo marrone scuro. Ha gli occhi neri e lucidi come due piccoli bottoni rotondi. Bello dorme ogni notte nel suo <span class="glw" title="cesto: contenitore morbido dove dorme il cane">cesto</span> vicino al divano del salotto. È il migliore amico di Filippo. Si vogliono tantissimo bene.`},
  {n:2, testo:`Ogni pomeriggio dopo la scuola Filippo gioca con Bello in <span class="glw" title="giardino: spazio verde vicino a casa">giardino</span>. Il gioco preferito di Bello è prendere il <span class="glw" title="pallone: palla gonfiata d'aria per giocare">pallone</span>. Filippo lancia il pallone rosso molto lontano sul prato verde. Bello corre velocissimo con le quattro zampe sull'erba. Lo prende in <span class="glw" title="bocca: parte del viso con i denti">bocca</span> con tanta cura e delicatezza. Poi lo riporta a Filippo tutto orgoglioso.`},
  {n:3, testo:`Un giorno il pallone finisce oltre il <span class="glw" title="cancello: porta di metallo o legno che chiude il giardino">cancello</span> del giardino. Va a finire nella strada asfaltata fuori. Bello abbaia forte davanti al cancello chiuso. Non riesce ad aprirlo da solo con le zampe. Filippo corre subito ad aprire il cancello. Prende il pallone dalla strada e lo riporta dentro il giardino al sicuro.`},
  {n:4, testo:`Dopo tanto correre e giocare Bello ha molta <span class="glw" title="sete: sensazione di voler bere">sete</span>. Va direttamente alla sua <span class="glw" title="ciotola: contenitore basso e rotondo per il cibo o l'acqua del cane">ciotola</span> dell'acqua fresca. Beve lunghe sorsate rumorose e abbondanti. L'acqua gli cola dalla bocca sul pavimento del giardino. Filippo ride vedendo il suo cane bere con tanto entusiasmo. Riempie di nuovo la ciotola con l'acqua fresca del rubinetto.`},
  {n:5, testo:`Quando comincia a fare buio e fresco Filippo porta Bello dentro casa al caldo. Gli versa le <span class="glw" title="crocchette: cibo secco specifico per i cani">crocchette</span> nella ciotola gialla della cena. Bello mangia tutto in fretta senza lasciare niente. Poi va a bere ancora un po' d'acqua tranquillo. Si lecca le labbra soddisfatto della buona cena. Si sdraia nel suo cesto morbido.`},
  {n:6, testo:`La sera Bello dorme vicino al letto di Filippo nella sua cameretta. Filippo lo sente respirare piano piano nel buio silenzioso. È molto contento di avere un amico così fedele e affettuoso. Prima di addormentarsi lo accarezza sulla testa morbida. Bello muove la coda contento anche nel sonno profondo. È davvero un cane felice e fortunato.`},
],
glossario:[
  {k:"Cesto", v:"Contenitore morbido e caldo dove dorme il cane come se fosse il suo letto."},
  {k:"Pallone", v:"Palla gonfiata d'aria che si usa per giocare in giardino o al parco."},
  {k:"Cancello", v:"Porta di metallo o legno che chiude l'entrata del giardino di casa."},
  {k:"Sete", v:"La sensazione di voler bere qualcosa perché la gola è secca."},
  {k:"Ciotola", v:"Contenitore basso e rotondo che si usa per il cibo e l'acqua degli animali."},
  {k:"Crocchette", v:"Cibo secco a forma di piccoli pezzi specifico per i cani e i gatti."},
  {k:"Bocca", v:"La parte del viso con i denti e la lingua, usata per mangiare e parlare."},
],

// ══ PROVA 15 — CAA: La torta del nonno ══════════════════════
{id:15, titolo:"La torta del nonno", sottotitolo:"Testo in CAA",
paragrafi:[
  {n:1, testo:`Il sabato mattina Anna va a trovare il nonno Carlo nella sua casa grande. Il nonno Carlo è anziano ma allegro e pieno di energia. Ha i <span class="glw" title="capelli: i peli che crescono sulla testa">capelli</span> bianchi come la neve e gli occhiali rotondi sul naso. La sua casa ha un grande <span class="glw" title="giardino: spazio verde con alberi e fiori vicino a casa">giardino</span> con tanti fiori colorati. Oggi il nonno Carlo vuole preparare una <span class="glw" title="torta: dolce morbido che si cuoce nel forno">torta</span>. Anna è felicissima di aiutarlo.`},
  {n:2, testo:`Il nonno e Anna entrano in <span class="glw" title="cucina: stanza della casa dove si prepara il cibo">cucina</span> insieme. Il nonno indossa il suo bel grembiule a righe rosse e bianche. Mette con cura il grembiule anche ad Anna perché non si sporchi i vestiti. Sul tavolo ci sono già tutti gli <span class="glw" title="ingredienti: le cose necessarie per preparare una ricetta">ingredienti</span> preparati. Ci sono le uova, la farina bianca, lo zucchero dolce e il burro morbido. «Cominciamo!» dice il nonno sorridendo felice.`},
  {n:3, testo:`Il nonno rompe con delicatezza le <span class="glw" title="uova: alimenti con il guscio che si usano in cucina">uova</span> in una ciotola grande. Anna mescola le uova con la <span class="glw" title="forchetta: posata con i denti usata per mangiare e mescolare">forchetta</span> con tanta energia e volontà. Poi il nonno aggiunge la farina, lo zucchero e il burro morbido nella ciotola grande. Anna mescola tutto insieme con forza. Il composto diventa piano piano giallo chiaro e morbido come velluto. L'odore è dolce e delizioso.`},
  {n:4, testo:`Il nonno accende il <span class="glw" title="forno: elettrodomestico che cuoce il cibo con il calore">forno</span> e aspetta che si scaldi bene. Versa il composto dolce in una <span class="glw" title="teglia: recipiente di metallo per cuocere le torte">teglia</span> rotonda e antiaderente. Anna lo aiuta a lisciare la superficie del composto con il cucchiaio in modo preciso. Il nonno mette con attenzione la teglia nel forno caldo. «Dobbiamo aspettare quaranta minuti buoni» dice il nonno. «Che ne dici di giocare a carte in giardino?»`},

const _apiCache = {};
const _apiPending = {};

function arasaacUrl(id){ return `https://static.arasaac.org/pictograms/${id}/${id}_500.png`; }

function cercaId(kw){
  if(!kw) return null;
  const k = kw.toLowerCase().replace(/[^a-zàáèéìíòóùú]/g,"");
  if(ARASAAC[k]) return ARASAAC[k];
  const stem = k.replace(/[aeiouàáèéìíòóùú]{1,2}$/, "");
  if(stem.length >= 4){
    const match = Object.keys(ARASAAC).find(w => w.startsWith(stem));
    if(match) return ARASAAC[match];
  }
  return null;
}

async function cercaIdAsync(kw){
  if(!kw) return null;
  const k = kw.toLowerCase().replace(/[^a-zàáèéìíòóùú]/g,"");
  if(k.length < 2) return null;
  const staticId = cercaId(k);
  if(staticId) return staticId;
  if(_apiCache[k] !== undefined) return _apiCache[k];
  if(_apiPending[k]) return _apiPending[k];
  _apiPending[k] = (async () => {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 5000);
      const r = await fetch(`https://api.arasaac.org/api/pictograms/it/search/${encodeURIComponent(k)}`,{signal:ctrl.signal});
      clearTimeout(timer);
      if(r.ok){
        const data = await r.json();
        const id = Array.isArray(data) && data.length > 0 ? data[0]._id : null;
        _apiCache[k] = id;
        delete _apiPending[k];
        return id;
      }
    } catch(e){}
    _apiCache[k] = null;
    delete _apiPending[k];
    return null;
  })();
  return _apiPending[k];
}

const STOP_FN = new Set([
  "il","lo","la","i","gli","le","un","una","uno",
  "di","a","da","in","con","su","per","tra","fra",
  "del","della","dei","degli","delle","al","alla",
  "ai","agli","alle","dal","dalla","dai","dagli","dalle",
  "nel","nella","nei","negli","nelle","sul","sulla","sui","sugli","sulle",
  "che","non","si","e","o","ma","anche","era","poi","suo","sua",
  "lui","lei","come","quando","dove","gli","ci","ne","ce",
  "mi","ti","vi","lo","la","li","le","ho","ha","fu","se",
  "col","coi","quel","quella","quei","quegli","quelle",
  "questo","questa","questi","queste","quello",
  "ad","ed","od","col","coi","all","dell","nell","sull",
]);

function stripHtml(html){
  // preserve glw title as readable word
  return html
    .replace(/<span[^>]*class="glw"[^>]*title="([^:"]*):[^"]*"[^>]*>([^<]*)<\/span>/g, "$1")
    .replace(/<[^>]+>/g, " ")
    .replace(/\s+/g, " ").trim();
}

function tokenize(text){
  // text can be HTML, strip first
  const plain = stripHtml(text);
  const tokens = [];
  // split keeping punctuation
  const parts = plain.split(/(\s+|(?<=[a-zàáèéìíòóùúA-Z])(?=[.,;:!?«»"()'\-–])|(?<=[.,;:!?«»"()'\-–])(?=[a-zàáèéìíòóùúA-Z]))/);
  for(const part of parts){
    if(!part || /^\s+$/.test(part)) continue;
    if(/^[.,;:!?«»"()\-–]+$/.test(part)){
      tokens.push({type:"punct", text:part});
      continue;
    }
    const clean = part.replace(/[^a-zàáèéìíòóùúA-Z]/gi,"");
    if(!clean) continue;
    const lc = clean.toLowerCase();
    const isFn = STOP_FN.has(lc) || clean.length <= 2;
    tokens.push({type: isFn ? "fn" : "key", text:part, kw:lc});
  }
  return tokens;
}

function buildWordBox(kw, displayText, small=false){
  const id = cercaId(kw);
  const sizeClass = small ? "small" : "";
  if(id){
    return `<div class="caa-wbox ${sizeClass}" data-kw="${kw}" data-id="${id}">
      <div class="caa-skel"></div>
      <span class="caa-wlbl">${displayText.toUpperCase()}</span>
    </div>`;
  } else {
    return `<div class="caa-wbox no-img ${sizeClass}" data-kw="${kw}">
      <span class="caa-wlbl">${displayText.toUpperCase()}</span>
    </div>`;
  }
}

function buildTokensHTML(text, small=false){
  const tokens = tokenize(text);
  return tokens.map(tok => {
    if(tok.type === "punct") return `<span class="caa-punct">${tok.text}</span>`;
    if(tok.type === "fn")    return `<span class="caa-fn">${tok.text}</span>`;
    return buildWordBox(tok.kw, tok.text, small);
  }).join("");
}

function renderStoria(prova){
  const html = prova.paragrafi.map(par => {
    const wordsHtml = buildTokensHTML(par.testo);
    return `<div class="caa-par" id="caa-par${par.n}">
      <div class="caa-par-num">📍 Paragrafo ${par.n}</div>
      <div class="caa-words">${wordsHtml}</div>
    </div>`;
  }).join("");
  document.getElementById("caa-storia-content").innerHTML = html;

  // Render glossario
  if(prova.glossario && prova.glossario.length){
    const gHtml = prova.glossario.map(g =>
      `<div class="caa-gloss-item"><span class="caa-gloss-key">${g.k}:</span><span>${g.v}</span></div>`
    ).join("");
    const panel = document.getElementById("caa-gloss-panel");
    panel.innerHTML = `<div class="caa-gloss"><div class="caa-gloss-titolo">📚 Glossario</div>${gHtml}</div>`;
    panel.classList.remove("hidden");
  }
}

function extractKWFromOption(text){
  // Get the most meaningful keyword from an answer option
  const tokens = tokenize(stripHtml(text));
  const keyTokens = tokens.filter(t => t.type === "key" && t.kw.length > 3);
  if(!keyTokens.length) return null;
  // Prefer a token that has an ARASAAC match
  for(const t of keyTokens){
    if(cercaId(t.kw)) return t.kw;
  }
  return keyTokens[0].kw;
}

function renderDomanda(dom, idx){
  const letters = ["A","B","C","D"];
  let optsHtml = "";

  if(dom.tipo === "sm"){
    optsHtml = `<div class="caa-opts">` +
      dom.opts.map((opt, i) => {
        const kw = extractKWFromOption(opt) || "";
        const id = kw ? cercaId(kw) : null;
        const imgHtml = id
          ? `<div class="caa-skel"></div>`
          : (EMOJI_FB[kw] ? `<span style="font-size:2.2rem">${EMOJI_FB[kw]}</span>` : "");
        return `<div class="caa-opt" data-idx="${i}" data-kw="${kw}" data-id="${id||""}"
            onclick="caaSelOpt(this,${dom.n},${i},${dom.ok})">
          ${imgHtml}
          <span class="caa-opt-letter">${letters[i]}</span>
          <span class="caa-opt-lbl">${opt}</span>
        </div>`;
      }).join("") + `</div>`;
  } else if(dom.tipo === "vf"){
    optsHtml = `<div class="caa-vf">` +
      dom.righeVF.map((row, ri) => {
        return `<div class="caa-vf-row">
          <span class="caa-vf-testo">${row.t}</span>
          <div class="caa-vf-btns">
            <button class="caa-vf-btn" onclick="caaSelVF(this,${dom.n},${ri},true,${row.ok})">V</button>
            <button class="caa-vf-btn" onclick="caaSelVF(this,${dom.n},${ri},false,${row.ok})">F</button>
          </div>
        </div>`;
      }).join("") + `</div>`;
  }

  // Reference paragraph label
  const parRef = dom.par > 0 ? `<span class="caa-dom-par">📍 Par. ${dom.par}</span>` : "";
  // Question text as CAA
  const qWords = buildTokensHTML(dom.testo, true);

  return `<div class="caa-dom" id="caa-dom-${dom.n}">
    <div class="caa-dom-hdr">
      <div class="caa-dom-num">${idx+1}</div>
      ${parRef}
    </div>
    <div class="caa-dom-testo">
      <div class="caa-words">${qWords}</div>
    </div>
    ${optsHtml}
  </div>`;
}

function renderDomande(prova){
  const sez0 = prova.domande.filter(d=>d.sez===0);
  const sez1 = prova.domande.filter(d=>d.sez===1);
  const sez2 = prova.domande.filter(d=>d.sez===2);
  let html = "";
  let globalIdx = 0;

  if(sez0.length){
    html += `<div class="caa-sez-hdr sez0-hdr">✏️ Parte 1 — Comprensione del testo</div>`;
    html += sez0.map(d => renderDomanda(d, globalIdx++)).join("");
  }
  if(sez1.length){
    html += `<div class="caa-sez-hdr sez1-hdr">🔤 Parte 2 — Lessico</div>`;
    html += sez1.map(d => renderDomanda(d, globalIdx++)).join("");
  }
  if(sez2.length){
    html += `<div class="caa-sez-hdr sez2-hdr">📐 Parte 3 — Grammatica</div>`;
    html += `<div class="caa-hint">💡 Il <strong>soggetto</strong> è chi fa l'azione. Il <strong>predicato</strong> è il verbo. Il <strong>complemento oggetto</strong> è chi subisce l'azione.</div>`;
    html += sez2.map(d => renderDomanda(d, globalIdx++)).join("");
  }

  // count total
  TOT_DOM = 0;
  prova.domande.forEach(d => {
    if(d.tipo==="sm") TOT_DOM++;
    else if(d.tipo==="vf") TOT_DOM += d.righeVF.length;
  });
  document.getElementById("pbinfo-l").textContent = `Completate: 0 / ${TOT_DOM} risposte`;
  document.getElementById("caa-domande-content").innerHTML = html;
}
